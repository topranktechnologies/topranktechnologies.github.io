<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — TopRank Technologies</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: white;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px 40px;
            background: #0d0d0d;
            position: fixed;
            width: 100%;
            top: 0;
        }

        nav a {
            color: #00eaff;
            margin-left: 20px;
            text-decoration: none;
            font-weight: 600;
        }

        section {
            padding: 120px 40px;
            max-width: 600px;
            margin: auto;
        }

        h2 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #00eaff, #0077ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input, textarea {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            border: none;
            background: #111;
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 14px 30px;
            background: #0077ff;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        footer {
            padding: 25px;
            text-align: center;
            background: #0d0d0d;
            color: #888;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">TopRank Technologies</div>
    <div>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<section>
    <h2>Contact Us</h2>

    <form action="https://formsubmit.co/YOUR_EMAIL_HERE" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" rows="6" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
    </form>
</section>

<footer>
    © 2026 TopRank Technologies, LLC — All Rights Reserved
</footer>

</body>
</html>
